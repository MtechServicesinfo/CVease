<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVease — Precision CV Joint Greasing Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&amp;family=Barlow:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C8181E;
    --red-dark: #9E1015;
    --black: #111111;
    --white: #FFFFFF;
    --gray: #F2F2F2;
    --gray-mid: #CCCCCC;
    --gray-dark: #444444;
    --type-display: 'Barlow Condensed', sans-serif;
    --type-body: 'Barlow', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--white); color: var(--black); font-family: var(--type-body); font-weight: 300; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--black);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw; height: 60px;
    border-bottom: 2px solid var(--red);
  }
  .nav-logo {
    font-family: var(--type-display); font-weight: 900; font-size: 1.6rem;
    color: var(--white); letter-spacing: 0.04em; text-decoration: none;
  }
  .nav-logo span { color: var(--red); }
  nav ul { list-style: none; display: flex; gap: 2rem; }
  nav ul li a {
    font-family: var(--type-display); font-size: 0.95rem; font-weight: 600;
    color: var(--gray-mid); text-decoration: none; letter-spacing: 0.08em;
    text-transform: uppercase; transition: color 0.2s;
  }
  nav ul li a:hover { color: var(--red); }

  /* HERO */
  .hero {
    margin-top: 60px; min-height: 90vh;
    background: var(--black);
    display: grid; grid-template-columns: 1fr 1fr; align-items: center;
    padding: 6rem 5vw;
    gap: 4rem;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0;
    width: 48%; background: #1a1a1a;
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-eyebrow {
    font-family: var(--type-display); font-weight: 600; font-size: 0.85rem;
    color: var(--red); letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem;
  }
  .hero-eyebrow::before {
    content: ''; display: inline-block; width: 2rem; height: 2px; background: var(--red);
  }
  .hero h1 {
    font-family: var(--type-display); font-weight: 900;
    font-size: clamp(2.8rem, 6vw, 5.5rem); line-height: 0.92;
    color: var(--white); text-transform: uppercase; letter-spacing: -0.01em;
    margin-bottom: 1.5rem;
  }
  .hero h1 em { color: var(--red); font-style: normal; }
  .hero-sub {
    font-size: 1.05rem; line-height: 1.7; color: #aaaaaa;
    max-width: 460px; margin-bottom: 2.5rem;
  }
  .hero-ctas { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--red); color: var(--white);
    font-family: var(--type-display); font-weight: 700; font-size: 1rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.85rem 2.25rem; text-decoration: none;
    border: 2px solid var(--red); transition: all 0.2s;
  }
  .btn-primary:hover { background: transparent; color: var(--red); }
  .btn-secondary {
    background: transparent; color: var(--white);
    font-family: var(--type-display); font-weight: 700; font-size: 1rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.85rem 2.25rem; text-decoration: none;
    border: 2px solid #444; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--white); }
  .hero-img { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
  .hero-img img { width: 100%; max-width: 500px; object-fit: contain; }

  /* SECTION SCAFFOLDING */
  section { padding: 6rem 5vw; }
  .section-label {
    font-family: var(--type-display); font-weight: 600; font-size: 0.8rem;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--red);
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;
  }
  .section-label::before {
    content: ''; display: inline-block; width: 2rem; height: 2px; background: var(--red);
  }
  .section-title {
    font-family: var(--type-display); font-weight: 900;
    font-size: clamp(2.2rem, 5vw, 3.8rem); text-transform: uppercase;
    line-height: 1; letter-spacing: -0.01em; margin-bottom: 2rem;
  }

  /* HOW IT WORKS */
  .how {  background: var(--gray); }
  .how-inner { max-width: 1200px; margin: 0 auto; }
  .how-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .how-diagram img { width: 100%; object-fit: contain; }
  .how-steps { display: flex; flex-direction: column; gap: 2rem; margin-top: 1.5rem; }
  .how-step { display: flex; gap: 1.25rem; align-items: flex-start; }
  .step-num {
    font-family: var(--type-display); font-weight: 900; font-size: 2.8rem;
    color: var(--gray-mid); line-height: 1; flex-shrink: 0; width: 2.5rem;
  }
  .step-text h4 {
    font-family: var(--type-display); font-weight: 700; font-size: 1.1rem;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem;
  }
  .step-text p { font-size: 0.92rem; line-height: 1.65; color: var(--gray-dark); }

  /* ABOUT */
  .about-inner { max-width: 1200px; margin: 0 auto; }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .about-img img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
  .about-content .section-title { margin-bottom: 1.25rem; }
  .about-content p { font-size: 1rem; line-height: 1.8; color: var(--gray-dark); margin-bottom: 1rem; }
  .about-content p:last-child { margin-bottom: 0; }
  .red-bar { width: 4rem; height: 4px; background: var(--red); margin-bottom: 1.5rem; }

  /* GALLERY */
  .gallery { background: var(--black); }
  .gallery .section-title { color: var(--white); }
  .gallery .section-label { color: var(--red); }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto auto;
    gap: 0.5rem; margin-top: 2.5rem;
  }
  .gallery-item { overflow: hidden; position: relative; cursor: pointer; }
  .gallery-item img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }
  .gallery-item:hover img { transform: scale(1.04); }
  .gallery-item.tall { grid-row: span 2; }
  .gallery-item.wide { grid-column: span 2; }

  /* PRODUCTS / STORE */
  .store { background: var(--gray); }
  .store-inner { max-width: 1200px; margin: 0 auto; }
  .products-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
    margin-top: 2.5rem;
  }
  .product-card {
    background: var(--white);
    border: 1px solid #e0e0e0;
    transition: box-shadow 0.2s;
  }
  .product-card:hover { box-shadow: 0 8px 32px rgba(200,24,30,0.12); }
  .product-card-img { aspect-ratio: 1; overflow: hidden; background: var(--black); }
  .product-card-img img { width: 100%; height: 100%; object-fit: contain; padding: 1.5rem; }
  .product-card-body { padding: 1.5rem; }
  .product-badge {
    display: inline-block; background: var(--red);
    font-family: var(--type-display); font-weight: 700; font-size: 0.7rem;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--white);
    padding: 0.25rem 0.65rem; margin-bottom: 0.75rem;
  }
  .product-badge.coming { background: var(--gray-dark); }
  .product-name {
    font-family: var(--type-display); font-weight: 800; font-size: 1.4rem;
    text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 0.4rem;
  }
  .product-desc { font-size: 0.88rem; line-height: 1.6; color: var(--gray-dark); margin-bottom: 1.25rem; }
  .product-price {
    font-family: var(--type-display); font-weight: 700; font-size: 1.5rem;
    color: var(--red); margin-bottom: 1rem;
  }
  .product-price.tbd { color: var(--gray-mid); font-size: 1rem; font-family: var(--type-body); }
  .btn-buy {
    display: block; text-align: center; width: 100%;
    background: var(--black); color: var(--white);
    font-family: var(--type-display); font-weight: 700; font-size: 0.9rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.8rem; border: 2px solid var(--black);
    text-decoration: none; transition: all 0.2s; cursor: pointer;
  }
  .btn-buy:hover { background: var(--red); border-color: var(--red); }
  .btn-buy.disabled {
    background: var(--gray-mid); border-color: var(--gray-mid); cursor: default;
  }
  .btn-buy.disabled:hover { background: var(--gray-mid); border-color: var(--gray-mid); }

  /* SPECS */
  .specs-strip {
    background: var(--red); padding: 0 5vw;
    display: flex; justify-content: center; flex-wrap: wrap;
    border-top: 1px solid black; border-bottom: 1px solid black;
  }
  .spec-item {
    text-align: center; padding: 2.5rem 3rem;
    border-right: 1px solid black;
  }
  .spec-item:first-child { border-left: 1px solid black; }
  .spec-val {
    font-family: var(--type-display); font-weight: 900; font-size: 2.4rem;
    color: var(--white); line-height: 1;
  }
  .spec-key {
    font-family: var(--type-display); font-weight: 600; font-size: 0.8rem;
    letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.7);
    margin-top: 0.35rem;
  }

  /* FOOTER */
  footer {
    background: var(--black); color: #888; padding: 3rem 5vw;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 1rem;
    border-top: 2px solid var(--red);
  }
  .footer-logo {
    font-family: var(--type-display); font-weight: 900; font-size: 1.4rem;
    color: var(--white); letter-spacing: 0.04em;
  }
  .footer-logo span { color: var(--red); }
  footer p { font-size: 0.82rem; }
  footer nav ul { display: flex; gap: 1.5rem; }
  footer nav ul li a { color: #888; text-decoration: none; font-size: 0.82rem; transition: color 0.2s; }
  footer nav ul li a:hover { color: var(--red); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  .modal-close {
    position: absolute; top: 1.5rem; right: 1.5rem; background: var(--red);
    color: var(--white); border: none; font-size: 1.5rem; width: 2.5rem; height: 2.5rem;
    cursor: pointer; font-family: var(--type-display); font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; padding: 4rem 5vw; }
    .hero::after { display: none; }
    .hero-img { display: none; }
    .how-grid, .about-grid { grid-template-columns: 1fr; }
    .products-grid { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: 1fr 1fr; }
    .gallery-item.tall { grid-row: span 1; }
    .gallery-item.wide { grid-column: span 2; }
    nav ul { display: none; }
  }
</style>
</head>
